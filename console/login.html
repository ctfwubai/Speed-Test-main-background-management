<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 内网测速系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      position: relative;
      overflow: hidden;
    }

    /* 背景装饰 - 与 dashboard 保持一致的色系 */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(102,126,234,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(118,75,162,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(102,126,234,0.06) 0%, transparent 50%);
      z-index: 0;
    }

    /* 网格装饰线 */
    .grid-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        linear-gradient(rgba(102,126,234,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(102,126,234,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeUp 0.6s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* LOGO 区域 */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 8px 24px rgba(102,126,234,0.30);
      margin-bottom: 16px;
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: white;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      color: #212529;
      margin-bottom: 4px;
    }

    .logo-area .subtitle {
      font-size: 14px;
      color: #868e96;
    }

    /* 登录卡片 */
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 36px 32px 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      transition: border-color 0.25s, box-shadow 0.25s;
      background: #f8f9fa;
    }

    .input-wrapper:focus-within {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.12);
      background: white;
    }

    .input-wrapper .icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      transition: color 0.25s;
    }

    .input-wrapper:focus-within .icon {
      color: #667eea;
    }

    .input-wrapper .icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 11px 12px 11px 0;
      font-size: 15px;
      color: #212529;
      outline: none;
      font-family: inherit;
    }

    .input-wrapper input::placeholder {
      color: #ced4da;
    }

    /* 密码可见切换 */
    .toggle-pwd {
      flex-shrink: 0;
      width: 40px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      cursor: pointer;
      color: #adb5bd;
      transition: color 0.2s;
    }

    .toggle-pwd:hover {
      color: #495057;
    }

    .toggle-pwd svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toggle-pwd .eye-off {
      display: none;
    }

    .toggle-pwd.showing .eye-on {
      display: none;
    }

    .toggle-pwd.showing .eye-off {
      display: block;
    }

    /* 登录按钮 */
    .login-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .login-btn:hover {
      opacity: 0.92;
      box-shadow: 0 4px 16px rgba(102,126,234,0.35);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* 按钮加载状态 */
    .login-btn .btn-text { display: inline; }
    .login-btn .btn-loading { display: none; }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .btn-loading { display: inline-flex; align-items: center; gap: 8px; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 消息区域 */
    .msg-area {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 0;
      border-radius: 8px;
      font-size: 13px;
      transition: all 0.3s;
    }

    .msg-area.error {
      background: #fff5f5;
      padding: 10px 14px;
      color: #e03131;
    }

    .msg-area.success {
      background: #f0fdf4;
      padding: 10px 14px;
      color: #2f9e44;
    }

    .msg-area.info {
      background: #e7f5ff;
      padding: 10px 14px;
      color: #1c7ed6;
    }

    .msg-area svg {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 尝试次数提示 */
    .attempt-info {
      text-align: center;
      font-size: 12px;
      color: #adb5bd;
      margin-top: 14px;
    }

    /* 底部信息 */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #adb5bd;
    }

    .footer .version {
      color: #868e96;
      font-weight: 500;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .login-wrapper { padding: 12px; }
      .login-card { padding: 28px 20px 24px; }
      .logo-area h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>

  <div class="login-wrapper">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <h1>内网测速系统</h1>
      <div class="subtitle">Intranet Speed Test System</div>
    </div>

    <div class="login-card">
      <div class="input-group">
        <label for="password">管理密码</label>
        <div class="input-wrapper">
          <div class="icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <input type="password" id="password" placeholder="请输入管理密码" autofocus autocomplete="current-password">
          <button type="button" class="toggle-pwd" id="toggleBtn" onclick="togglePassword()" tabindex="-1" aria-label="切换密码可见性">
            <svg class="eye-on" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-off" viewBox="0 0 24 24">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="login-btn" id="loginBtn" onclick="login()">
        <span class="btn-text">登 录</span>
        <span class="btn-loading"><span class="spinner"></span> 验证中...</span>
      </button>

      <div id="msgArea" class="msg-area"></div>
      <div id="attemptInfo" class="attempt-info"></div>
    </div>

    <div class="footer">
      <span class="version">企业内网测速系统 v2.0</span> &middot; 密码安全访问
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const msgArea = document.getElementById('msgArea');
    const attemptInfo = document.getElementById('attemptInfo');

    // 获取重定向参数（登录后跳回原页面）
    const redirectParam = new URLSearchParams(window.location.search).get('redirect') || '';

    // Enter 键登录
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    // 聚焦时清除错误状态
    passwordInput.addEventListener('focus', () => {
      clearMsg();
    });

    // 密码可见切换
    function togglePassword() {
      const pwd = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        btn.classList.add('showing');
      } else {
        pwd.type = 'password';
        btn.classList.remove('showing');
      }
    }

    function clearMsg() {
      msgArea.className = 'msg-area';
      msgArea.innerHTML = '';
    }

    function showMsg(type, iconPath, text) {
      msgArea.className = 'msg-area ' + type;
      msgArea.innerHTML = '<svg viewBox="0 0 24 24">' + iconPath + '</svg>' + text;
    }

    async function login() {
      const pwd = passwordInput.value.trim();

      // 清除旧消息
      clearMsg();
      attemptInfo.textContent = '';

      if (!pwd) {
        showMsg('error', '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>', '请输入管理密码');
        passwordInput.focus();
        return;
      }

      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwd, redirect: redirectParam }),
        });
        const data = await res.json();

        if (res.ok) {
          showMsg('success', '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>', '登录成功，正在跳转...');
          msgArea.style.animation = 'none';
          setTimeout(() => {
            window.location.href = data.redirect || '/';
          }, 600);
        } else if (res.status === 401) {
          showMsg('error', '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>', data.error || '密码错误');
          if (data.remainingAttempts !== undefined) {
            if (data.remainingAttempts > 0) {
              attemptInfo.textContent = '剩余尝试次数: ' + data.remainingAttempts + ' 次';
            }
          }
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
          passwordInput.value = '';
          passwordInput.focus();
        } else if (res.status === 429) {
          showMsg('error', '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>', data.error || '登录过于频繁，请稍后重试');
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
          const minutes = data.remainingMinutes;
          if (minutes) {
            attemptInfo.textContent = minutes + ' 分钟后可重试';
          }
        } else {
          showMsg('error', '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>', data.error || '登录失败');
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
        }
      } catch (e) {
        showMsg('error', '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>', '网络连接失败，请检查服务器状态');
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
